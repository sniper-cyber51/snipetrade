<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SNIPE BUY</title>
    <link rel="stylesheet" href="extraction.css">
    <link rel="shortcut icon" href="webIMG/snipeTrade.ico" type="image/x-icon">
</head>
<header>
    <div class="nav-buttons">
        <a href="products.html" class="btn primary">ACHETER</a>
        <a href="sell.html" class="btn secondary">VENDRE</a>
        <a href="accueil.html" class="btn primary">ACCUEIL</a>
    </div>
    <h2 style="text-align: center; color: #fefefe;">NOS PRODUITS</h2>
</header>

<body>

    <div id="display-area">
        <p>Chargement des articles...</p>
    </div>

    <script>
        function loadProducts() {
            // Appel AJAX vers le fichier PHP
            fetch('extraction.php')
                .then(response => response.text())
                .then(html => {
                    document.getElementById('display-area').innerHTML = html;
                })
                .catch(error => {
                    console.error('Erreur lors du chargement:', error);
                });
        }

        // Charger les produits dès l'ouverture
        loadProducts();

        // Vérifier les nouvelles insertions toutes les 4 secondes
        setInterval(loadProducts, 4000);
    </script>
</body>

</html>
