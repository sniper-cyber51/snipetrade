<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Platforme de vente en ligne</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header>
        <nav>
            <ul>
                <li>
                    <button class="BTN1"><a href="index.html">Accueil</a>
                </li></button>
                <li>
                    <button class="BTN1"><a href="sell.html">Vendre</a></button>
                </li>
                <li>
                    <button class="BTN1"><a href="products.html">Acheter</a></button>
                </li>
                <li>
                    <button class="BTN1"><a href="à propos.html">A propos de Nous</a></button>
                </li>
                <li>
                    <button class="BTN1"><a href="contact.html">Contact</a></button>
                </li>
            </ul>
        </nav>
    </header>

    <main>
        <h1>Bienvenue sur la plateforme de vente en ligne du sniper 51</h1>

        <div class="search-container"><input type="text" placeholder="Rechercher votre produit" id="searchInput"><button
                onclick="searchProducts()">Rechercher

            </button></div>
        <div class="product-grid">😎😎</div>
    </main>
    <footer>
        <p>&copy; 2024 plateforme de vente en ligne. Tout droits réservé.</p>
    </footer>


    <div id="signupModal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h2>S'inscrire</h2>
            <form><input type="text" placeholder="Nom d'utilisateur" id="signupUsername">
                <input type="email" placeholder="Email" id="signupEmail">
                <input type="password" placeholder="Mot de passe" id="signupPassword">
                <button type="button" onclick="signup()">S'inscrire</button>
            </form>
        </div>
    </div>


    <div id="loginModal" class="modal">
        <div class="modal-content"><span>
                <h2>J'ai déjà un compte</h2>
            </span>
            <form> <input type="text" placeholder="Nom d'utilisateur" id="loginUsername">
                <input type="password" placeholder="Mot de passe" id="loginPassword"><button type="button"
                    onclick="login()">
                    Se connecter </button>
            </form>
        </div>
    </div>



    <script> function searchProducts() {
            const searchInput = document.getElementById("searchInput");
            const searchTerm = searchInput.value.toLowerCase();
            const productGrid = document.getElementById("productGrid");
            const product = productGrid.getElementsByClassName("product-card");

            for (let i = 0; i < products.length; i++) {
                const product = products[i];
                const productName = product.getElementsByTagName("h3")[0].textContent.toLowerCase();
                if (productName.includes(searchTerm)) {
                    product.style.display
                        = "block";
                } else {
                    product.style.display = "none";
                }
            }
        }


        function signup() {
            const signupUsername = document.getElementById(signupUsername).value;
            const signupEmail = document.getElementById(signupEmail).value;
            const signupPassword = document.getElementById(signupPassword).value;
            console.log("Inscription :",
                signupUsername, signupEmail, signupPassword);
            document.getElementById("signupModal").style.display = "none";
        }


        function login() {
            const loginUsername = document.getElementById("loginUsername").value;
            const loginPassword = document.getElementById("loginPassword").value;
            console.log("Connecxion :",
                loginUsername, loginPassword);
            document.getElementById("loginModal").style.display = "none";
        }


        document.getElementById("signupBtn").addEventListener("click", function () {
            document.getElementById("signupModal").style.display = "block";
        });

        document.getElementById("loginBtn").addEventListener("click", function () {
            document.getElementById("loginModal").style.display = "block";
        });

        const closeButton = document.getElementsByClassName("close");
        for (let i = 0; i < closeButtons.length; i++) {
            closeButtons[i].addEventListener("click", function () {
                const modal = this.closest(".modal"); modal.style.display = "none";
            });
        }

    </script>
</body>

</html>
